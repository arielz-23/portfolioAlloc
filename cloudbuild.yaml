steps:
  # 1 — Build the image
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag=gcr.io/$PROJECT_ID/portfolio-dashboard:$SHORT_SHA
      - --tag=gcr.io/$PROJECT_ID/portfolio-dashboard:latest
      - .

  # 2 — Push both tags to Container Registry
  - id: push
    name: gcr.io/cloud-builders/docker
    waitFor: [build]
    args:
      - push
      - --all-tags
      - gcr.io/$PROJECT_ID/portfolio-dashboard

  # 3 — Deploy to Cloud Run
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    waitFor: [push]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - portfolio-dashboard
      - --image=gcr.io/$PROJECT_ID/portfolio-dashboard:$SHORT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=us-central1
      - --memory=2Gi
      - --cpu=1
      - --timeout=300
      - --concurrency=20

images:
  - gcr.io/$PROJECT_ID/portfolio-dashboard:latest
  - gcr.io/$PROJECT_ID/portfolio-dashboard:$SHORT_SHA

options:
  # Fixes "build.service_account requires logs_bucket" org policy error
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
